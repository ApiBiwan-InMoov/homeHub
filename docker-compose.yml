services:
  homehub:
    network_mode: host
    build:
      context: .
      dockerfile: docker/Dockerfile
    env_file:
      - .env
    volumes:
      - /var/run/dbus:/var/run/dbus
      - /var/run/systemd:/var/run/systemd
      - ./secrets:/app/secrets:rw
      - ./app:/app/app:rw
    # Expose host sound devices for microphone features (ALSA/PortAudio)
    devices:
      - /dev/snd:/dev/snd
    group_add:
      - audio
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: always
    privileged: true
    pid: host

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: mosquitto
    restart: always
    network_mode: host
    volumes:
      - ./mosquitto/config:/mosquitto/config
      - ./mosquitto/data:/mosquitto/data
      - ./mosquitto/log:/mosquitto/log
