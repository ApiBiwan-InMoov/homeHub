services:
  homehub:
    network_mode: host
    build:
      context: .
      dockerfile: docker/Dockerfile
    env_file:
      - .env
    volumes:
      - ./secrets:/app/secrets:ro
      - ./app:/app/app:rw
    # Expose host sound devices for microphone features (ALSA/PortAudio)
    devices:
      - /dev/snd:/dev/snd
    group_add:
      - audio
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
