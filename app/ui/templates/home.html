{% extends "base.html" %}
{% block title %}Home · HomeHub{% endblock %}

{% block content %}
<div class="max-w-7xl mx-auto p-4 space-y-8">

  <!-- WEATHER -->
  <section>
    <div class="grid grid-cols-2 gap-3">
      <!-- Today summary -->
      <div class="rounded-xl p-3 border border-slate-700 bg-slate-800/60 flex flex-col justify-center gap-2">
        <div class="flex items-center gap-4">
          <div id="wx-today-ico" class="text-5xl">☀️</div>
          <div id="wx-summary" class="text-lg font-bold">—</div>
        </div>
        <div class="space-y-1">
          <div id="wx-minmax" class="text-sm opacity-80">—</div>
          <div id="wx-extra" class="opacity-70 text-xs">—</div>
        </div>
      </div>

      <!-- Temp + precip chart (Condensed) -->
      <div class="rounded-xl p-2 border border-slate-700 bg-slate-800/60">
        <div class="w-full h-32">
          <canvas id="wx-chart" style="width:100%; height:120px;"></canvas>
        </div>
      </div>
    </div>

    <!-- Hour by hour (Mini) -->
    <div class="mt-2 flex gap-2 overflow-x-auto scrollbar-hide">
      <div id="wx-hourly" class="flex gap-2"></div>
    </div>

    <!-- Daily forecast (NEW) -->
    <div class="mt-4">
      <h2 class="text-lg font-semibold mb-2">Prévisions 7 jours</h2>
      <div class="flex gap-2 overflow-x-auto scrollbar-hide">
        <div id="wx-daily" class="flex gap-2"></div>
      </div>
    </div>
  </section>

  <!-- CALENDAR (next 14 days) -->
  <section>
    <div class="flex items-center justify-between">
      <h2 class="text-xl font-semibold">Agenda (2 semaines)</h2>
      <a href="/calendar/ui" class="px-3 py-1 rounded bg-slate-700">Ouvrir</a>
    </div>
    <div id="home-cal" class="space-y-6 mt-3"></div>
    <div id="home-cal-err" class="text-sm text-amber-400 hidden"></div>
  </section>

  <!-- STATUS STRIP & VOCAL -->
  <section class="fixed bottom-0 left-0 w-full bg-slate-900/95 border-t border-slate-700 p-3 z-40 backdrop-blur-md">
    <div class="flex items-center gap-4 max-w-7xl mx-auto">
      <!-- Vocal Button -->
      <button id="main-action-btn" class="flex-none w-14 h-14 rounded-full bg-blue-600 hover:bg-blue-500 shadow-lg shadow-blue-500/50 flex items-center justify-center text-2xl transition-transform active:scale-95">
        🎙️
      </button>
      
      <!-- Shortcuts (One line) -->
      <div id="status-icons" class="flex-1 flex flex-nowrap overflow-x-auto gap-3 pb-1 scrollbar-hide"></div>
    </div>
  </section>

</div>

<style>
.badge{ border:1px solid #334155; border-radius:.75rem; background:rgba(30,41,59,.6); padding:.5rem .75rem; }
.stat{ min-width:84px; text-align:center; }
.stat .ico{ font-size:1.25rem; }
.stat.on{ background:rgba(16,185,129,.2); border-color:#10b981; }
.stat.off{ background:rgba(71,85,105,.3); }
.hourchip{ min-width:70px; }

 /* Calendar grid — same as events.html */
 .cal-grid { display:grid; grid-template-columns:auto 1fr; gap:.75rem; }

 .cal-daybox{ width:54px;height:54px;display:flex;align-items:center;justify-content:center;
              border-radius:.75rem;border:1px solid #334155;background:rgba(30,41,59,.7);
              font-weight:700;font-size:1.25rem; }
 .cal-pill,.cal-card,.cal-chip,.cal-trip{ border:1px solid #334155;border-radius:.5rem;background:rgba(30,41,59,.6);
                                padding:.3rem .6rem;display:flex;align-items:center; }
 .cal-pill{ font-weight:600; }
 .cal-month{ font-size:1.25rem;font-weight:700;border-bottom:1px solid #334155;padding-bottom:.5rem;color:#94a3b8;text-transform:uppercase;letter-spacing:0.05em; }
 .subtle{ opacity:.75;font-size:.85rem; }
 .daywrap{ width:54px; }
 .cal-badge{ position:absolute;bottom:-6px;right:-6px;font-size:.70rem;line-height:1;padding:3px 6px;
             border-radius:9999px;background:#0ea5e9;color:white;box-shadow:0 1px 2px rgba(0,0,0,.3); }
 .cal-ongoing{ border:1px solid #f59e0b;background:rgba(245,158,11,.15);font-weight:700;margin-left:.5rem; }
 .cal-range{ font-size:.80rem;margin-right:.5rem; }

 /* Status icon cards + countdown ring */

/* --- Status icons card --- */
.icon-btn{
  position:relative; display:block; text-align:left;
  border:1px solid #334155; border-radius:.9rem; background:rgba(30,41,59,.6);
  padding:.75rem .9rem; transition:background-color .2s,border-color .2s,opacity .2s;
}
.icon-btn:hover{ background:rgba(30,41,59,.75); }
.icon-btn[disabled]{ opacity:.65; pointer-events:none; }

.icon-main{ display:flex; align-items:center; gap:.75rem; min-height:64px; }
.icon-ico-wrap{
  position:relative; width:56px; height:56px; flex:0 0 56px; display:grid; place-items:center;
}
.icon-ico{ font-size:40px; line-height:1; }
.icon-ico img{ width:48px; height:48px; object-fit:contain; display:block; }

.icon-ring{
  position:absolute; inset:0; border-radius:9999px; pointer-events:none;
  /* ring thickness */
  --ring-pad: 4px;
  padding: var(--ring-pad);
  background:
    conic-gradient(var(--accent, #10b981) var(--deg, 0deg), transparent var(--deg, 0deg));
  -webkit-mask:
    radial-gradient(farthest-side, transparent calc(100% - var(--ring-pad)*2 - 2px),
                    black calc(100% - var(--ring-pad)*2));
          mask:
    radial-gradient(farthest-side, transparent calc(100% - var(--ring-pad)*2 - 2px),
                    black calc(100% - var(--ring-pad)*2));
  opacity:.9; display:none;
}
.icon-btn.timer .icon-ring{ display:block; }

.icon-meta{ display:flex; flex-direction:column; gap:2px; min-width:0; }
.icon-meta .meta-label{ font-weight:600; }
.icon-meta .js-display{ opacity:.8; font-size:.82rem; }

/* small time bubble on the icon ring */
.icon-eta{
  position:absolute; right:-4px; bottom:-4px;
  font-size:.70rem; line-height:1; padding:2px 6px;
  border-radius:9999px; background:#0ea5e9; color:white;
  box-shadow:0 1px 2px rgba(0,0,0,.3); display:none;
}
.icon-btn.timer .icon-eta{ display:block; }

/* busy overlay shown immediately on click */
.icon-busy{
  position:absolute; inset:0; display:none; align-items:center; justify-content:center;
  background:rgba(2,6,23,.25); border-radius:inherit;
}
.icon-btn.is-busy .icon-busy{ display:flex; }
.spin{
  width:22px;height:22px; border:3px solid rgba(148,163,184,.35);
  border-top-color: var(--accent, #10b981); border-radius:9999px; animation:sp 1s linear infinite;
}
@keyframes sp{ to{ transform:rotate(360deg); } }
</style>

<!-- Lucide (needed to render lucide:* icons here too) -->
<script src="https://unpkg.com/lucide@0.469.0/dist/umd/lucide.js"></script>

<script>
(function () {
  // ---------- small utils ----------
  const el = (tag, cls, txt) => { const d=document.createElement(tag); if(cls) d.className=cls; if(txt!=null) d.textContent=txt; return d; };
  const fmtC = x => (x==null) ? '—' : (Math.round(x) + '°');
  const fmtmm = x => (x==null) ? '—' : (Math.round(x) + ' mm');
  const fmtHour = iso => new Date(iso).toLocaleTimeString(undefined,{hour:'2-digit',minute:'2-digit',hour12:false});
  const todayISO = () => new Date().toISOString();
  const untilISO = days => { const d=new Date(); d.setDate(d.getDate()+days); return d.toISOString(); };

  // ---------- Weather icons ----------
  function wxIcon(code){
    return wmoToIconAndText(Number(code)).icon;
  }

  // ---------- Countdown manager (for status icons) ----------
  let _activeTimers = new Map();
  let _tickRunning = false;
  const _fmtMMSS = sec => { const m=(sec/60)|0, s=sec%60|0; return `${m}:${String(s).padStart(2,'0')}`; };

  function _ensureTick(){
    if (_tickRunning) return;
    _tickRunning = true;
    requestAnimationFrame(_tick);
  }
  function _tick(){
    const now = Date.now();
    let any=false;
    _activeTimers.forEach(st=>{
      const msLeft = Math.max(0, st.endAt - now);
      const sec = Math.round(msLeft/1000);
      if (st.ring){
        const pct = st.total>0 ? 1 - (msLeft/(st.total*1000)) : 0;
        const deg = Math.min(360, Math.max(0, pct*360));
        st.ring.style.setProperty('--deg', deg+'deg');
      }
      if (st.eta) st.eta.textContent = _fmtMMSS(Math.max(0, sec));
      if (sec>0) any=true;
      else {
        // timer finished visually — hide until preview says otherwise
        if (st.btn) st.btn.classList.remove('timer');
      }
    });
    if (any) requestAnimationFrame(_tick); else _tickRunning=false;
  }

  // Preview drives real timers; we mirror them locally for smooth UI
  function _updateTimersFromPreview(items){
  const now  = Date.now();
  const next = new Map();               // build a brand-new map

  (items || []).forEach(it => {
    const rem = Number(it?.timer?.remaining_sec);
    if (!Number.isFinite(rem) || rem <= 0) return;

    const prev  = _activeTimers.get(it.id);
    const total = (prev && Number.isFinite(prev.total)) ? prev.total : rem; // keep original total if known

    next.set(it.id, {
      endAt: now + rem * 1000,
      total,
      btn: null, wrap: null, ring: null, eta: null
    });
  });

  // swap maps atomically to avoid leaking refs across cards
  _activeTimers.clear();
  next.forEach((v,k) => _activeTimers.set(k, v));

  if (_activeTimers.size) _ensureTick();
}


  // ===== Rendering =====
  function renderIcon(el, spec){
    if (!spec){ el.textContent='🔘'; return; }
    if (typeof spec === 'string' && spec.startsWith('lucide:')){
      const name = spec.slice(7);
      el.innerHTML = `<i data-lucide="${name}"></i>`;
      if (window.lucide && lucide.icons && lucide.icons[name]){
        lucide.createIcons({ attrs:{ width:40, height:40 }, icons:{ [name]: lucide.icons[name] } });
      }
    } else if (typeof spec === 'string' && /(^\/|^https?:).+\.(png|jpg|jpeg|gif|svg)$/.test(spec)){
      el.innerHTML = `<img alt="" src="${spec}">`;
    } else {
      el.textContent = spec; // emoji/plain
    }
  }

  function iconCard(it){
    const btn = document.createElement('button');
    btn.className = 'icon-btn';
    btn.style.setProperty('--accent', it.color || '#10b981');

    const main = el('div','icon-main');
    const wrap = el('div','icon-ico-wrap');
    const ring = el('div','icon-ring');
    const ico  = el('div','icon-ico js-ico');
    const eta  = el('div','icon-eta js-eta','0:00');
    wrap.append(ring, ico, eta);

    const meta = el('div','icon-meta');
    meta.append(el('div','meta-label', it.label || ''), el('div','js-display', it.display || ''));

    main.append(wrap, meta);
    const busy = el('div','icon-busy');
    busy.append(el('div','spin'));
    btn.append(main, busy);

    renderIcon(ico, it.icon);

    // Attach to existing timer if any
    const st = _activeTimers.get(it.id);
    if (st){
      st.btn = btn; st.wrap = wrap; st.ring = ring; st.eta = eta;
      btn.classList.add('timer');
      const msLeft = Math.max(0, st.endAt - Date.now());
      const pct = st.total > 0 ? 1 - (msLeft / (st.total * 1000)) : 0;
      ring.style.setProperty('--deg', `${Math.min(360, Math.max(0, pct * 360))}deg`);
      eta.textContent = _fmtMMSS(Math.round(msLeft/1000));
    } else {
      btn.classList.remove('timer');                 // 👈 ensure non-timer cards are clean
      ring.style.setProperty('--deg', '0deg');       // reset visual ring
    }
    // Click behavior:
    // 1) If a timer is active → cancel immediately
    // 2) Else → show immediate busy state while action is sent, then reload
    btn.addEventListener('click', ()=>{
      // avoid double click while busy
      if (btn.classList.contains('is-busy')) return;

      if (_activeTimers.has(it.id)){
        btn.classList.add('is-busy'); btn.disabled = true;
        fetch(`/status/icons/action/${encodeURIComponent(it.id)}/cancel`, { method:'POST' })
          .then(()=> loadIcons())
          .catch(()=> loadIcons());
        // failsafe remove busy in case reload is slow
        setTimeout(()=>{ if (btn.isConnected) { btn.classList.remove('is-busy'); btn.disabled=false; } }, 2500);
        return;
      }

      // optimistic busy right away
      btn.classList.add('is-busy'); btn.disabled = true;

      fetch('/status/icons/action/'+encodeURIComponent(it.id), { method:'POST' })
        .then(()=> loadIcons())
        .catch(()=> loadIcons());

      // If this icon usually has a timer, preview will install it.
      // Busy is kept until loadIcons re-renders; add failsafe just in case.
      setTimeout(()=>{ if (btn.isConnected) { btn.classList.remove('is-busy'); btn.disabled = false; } }, 2500);
    });

    return btn;
  }

  async function loadIcons(){
    const errEl = document.getElementById('status-err');
    try{
      const r = await fetch('/status/icons/preview', { cache:'no-store' });
      if (!r.ok) throw new Error('HTTP '+r.status);
      const j = await r.json();

      _updateTimersFromPreview(j.items || []);

      const box = document.getElementById('status-icons');
      box.innerHTML = '';
      (j.items || []).forEach(it => box.appendChild(iconCard(it)));

      if (window.lucide && lucide.createIcons) {
        lucide.createIcons({ attrs: { width: 40, height: 40 } });
      }
      errEl.classList.add('hidden');
    }catch(e){
      errEl.textContent = 'Impossible de charger les raccourcis';
      errEl.classList.remove('hidden');
    }
  }

  // expose for rest of page init
  window.loadIcons = loadIcons;


  // ---------- WEATHER ----------
  async function loadWeather(){
    try {
      const r = await fetch('/weather/hourly', {cache:'no-store'});
      if (!r.ok) throw new Error(await r.text());
      const data = await r.json();
      
      const hours = data.hours || [];
      const daily = data.daily || [];
      const tz = (data.meta && data.meta.tz) || "UTC";
      
      const nowLocalHour = new Date(new Date().toLocaleString('en-US', { timeZone: tz }));
      nowLocalHour.setMinutes(0,0,0,0);
      const startIdx = hours.findIndex(h => new Date(h.time) >= nowLocalHour);
      const hourly24 = (startIdx >= 0) ? hours.slice(startIdx, startIdx + 24) : hours.slice(0, 24);
      const current = hourly24[0] || {};
      
      return {
        today: {
          code: current.code,
          summary: wmoToIconAndText(current.code != null ? current.code : 0).text,
          temp_now: current.temp,
          tmax: Math.max(...hourly24.map(h => h.temp ?? h.t ?? 0)),
          tmin: Math.min(...hourly24.map(h => h.temp ?? h.t ?? 0)),
          precip: current.mm ?? current.p ?? 0,
          wind: current.windspeed ?? 0
        },
        hourly24: hourly24,
        daily7: daily
      };
    } catch (e) {
      console.error("Home weather load failed:", e);
      // Fallback to old endpoint if it exists or re-throw
      const r = await fetch('/weather/pack',{cache:'no-store'});
      if(!r.ok) throw e;
      return r.json();
    }
  }

  function drawChart(canvas, hours){
    const dpr = Math.max(1, window.devicePixelRatio || 1);
    const cssW = canvas.clientWidth;
    const cssH = Math.max(160, parseInt(getComputedStyle(canvas).height,10) || 200);
    canvas.width = Math.round(cssW * dpr);
    canvas.height = Math.round(cssH * dpr);
    const ctx = canvas.getContext('2d');
    ctx.setTransform(dpr,0,0,dpr,0,0);
    ctx.clearRect(0,0,cssW,cssH);

    const M = {l:36, r:10, t:10, b:22};
    const W = cssW - M.l - M.r;
    const H = cssH - M.t - M.b;
    if (hours.length < 2) return;

    const temps = hours.map(h=>Number(h.temp ?? h.t ?? 0));
    const precs = hours.map(h=>Number(h.mm ?? h.p ?? 0));
    const times = hours.map(h=>new Date(h.time));

    const tmin = Math.min(...temps), tmax = Math.max(...temps);
    const pmax = Math.max(1, Math.max(...precs));
    const x = i => M.l + (i*(W/(hours.length-1)));
    const yTemp = v => M.t + (H - ((v - tmin)/(tmax - tmin || 1))*(H*0.8)) - 4;
    const barBase = M.t + H, barMaxH = H*0.32;

    const colorPos = 'rgba(99,102,241,.95)';   // indigo for >= 0°C
    const colorNeg = 'rgba(59,130,246,.95)';   // blue for < 0°C
    const colorPosFill = 'rgba(99,102,241,.18)';
    const colorNegFill = 'rgba(59,130,246,.14)';

    // grid + ticks
    const grid = 'rgba(148,163,184,.2)';
    const grid2 = 'rgba(148,163,184,.15)';
    const text = 'rgba(203,213,225,.8)';
    ctx.strokeStyle = grid; ctx.lineWidth = 1;
    for (let i=0;i<hours.length;i+=3){ ctx.beginPath(); ctx.moveTo(x(i),M.t); ctx.lineTo(x(i),M.t+H); ctx.stroke(); }
    const yTicks = [tmin, (tmin+tmax)/2, tmax];
    ctx.fillStyle = text; ctx.font = '11px ui-sans-serif, system-ui'; ctx.textAlign='right';
    yTicks.forEach(v=>{ const yy=yTemp(v); ctx.strokeStyle=grid2; ctx.beginPath(); ctx.moveTo(M.l,yy); ctx.lineTo(M.l+W,yy); ctx.stroke(); ctx.fillText(Math.round(v)+'°', M.l-6, yy+3); });

    // precip bars
    ctx.fillStyle = 'rgba(56,189,248,.65)';
    const barW = Math.max(2, W/(hours.length*1.35));
    precs.forEach((p,i)=>{ const h=(p/pmax)*barMaxH; ctx.fillRect(x(i)-barW/2, barBase-h, barW, h); });

    // temp fill area
    const hasNeg = temps.some(t=>t<0);
    const grad = ctx.createLinearGradient(0,M.t,0,M.t+H);
    grad.addColorStop(0, hasNeg ? colorNegFill : colorPosFill);
    grad.addColorStop(1, 'rgba(99,102,241,0)');
    ctx.beginPath(); ctx.moveTo(x(0), yTemp(temps[0]));
    for(let i=1;i<hours.length;i++){ ctx.lineTo(x(i), yTemp(temps[i])); }
    ctx.lineTo(x(hours.length-1), barBase); ctx.lineTo(x(0), barBase); ctx.closePath(); ctx.fillStyle = grad; ctx.fill();

    // temp line with per-segment color (blue when crossing below zero)
    ctx.lineWidth = 3;
    for(let i=1;i<hours.length;i++){
      const v0 = temps[i-1];
      const v1 = temps[i];
      const segNeg = (v0 < 0) || (v1 < 0);
      ctx.strokeStyle = segNeg ? colorNeg : colorPos;
      ctx.beginPath();
      ctx.moveTo(x(i-1), yTemp(v0));
      ctx.lineTo(x(i), yTemp(v1));
      ctx.stroke();
    }

    // points and hour labels
    for(let i=0;i<hours.length;i+=1){
      const v = temps[i];
      ctx.fillStyle = (v < 0) ? colorNeg : colorPos;
      ctx.beginPath(); ctx.arc(x(i), yTemp(v), 3.25, 0, Math.PI*2); ctx.fill();
    }
    ctx.textAlign='center'; ctx.fillStyle='rgba(203,213,225,.75)';
    for(let i=0;i<hours.length;i+=3){ const hh=times[i].toLocaleTimeString(undefined,{hour:'2-digit',minute:'2-digit',hour12:false}); ctx.fillText(hh, x(i), M.t+H+16); }
  }

  function fillWeather(wx){
    document.getElementById('wx-today-ico').textContent = wxIcon(wx.today.code);
    document.getElementById('wx-summary').textContent = (wx.today.summary || 'Météo') + (wx.today.temp_now!=null ? (' · ' + (Math.round(wx.today.temp_now)+'°')) : '');
    document.getElementById('wx-minmax').textContent = 'Max ' + fmtC(wx.today.tmax) + '  •  Min ' + fmtC(wx.today.tmin);
    document.getElementById('wx-extra').textContent = 'Précip: ' + fmtmm(wx.today.precip) + (wx.today.wind!=null ? ('  •  Vent ' + Math.round(wx.today.wind) + ' km/h') : '');
    
    const canvas = document.getElementById('wx-chart');
    const redraw = ()=> drawChart(canvas, wx.hourly24);
    new ResizeObserver(redraw).observe(canvas.parentElement);
    redraw();

    const hw = document.getElementById('wx-hourly'); hw.innerHTML = '';
    
    // Filter to start from current hour
    const nowLocalHour = new Date();
    nowLocalHour.setMinutes(0,0,0,0);
    const hourlyStartIdx = wx.hourly24.findIndex(h => new Date(h.time) >= nowLocalHour);
    const hourlySlice = hourlyStartIdx >= 0 ? wx.hourly24.slice(hourlyStartIdx, hourlyStartIdx + 18) : wx.hourly24.slice(0, 18);

    hourlySlice.forEach(h=>{
      const chip = el('div','badge hourchip flex-none flex flex-col items-center gap-1 py-1 px-2');
      chip.style.minWidth = "64px";
      chip.appendChild(el('div','text-[10px] opacity-70', fmtHour(h.time)));
      chip.appendChild(el('div','text-lg', wxIcon(h.code!=null ? h.code : (h.p>0 ? 61 : 0))));
      chip.appendChild(el('div','text-sm font-semibold', fmtC(h.temp || h.t)));
      hw.appendChild(chip);
    });

    const dw = document.getElementById('wx-daily'); dw.innerHTML = '';
    wx.daily7.forEach(d=>{
      const box = el('div','badge flex-none flex flex-col items-center py-2 px-2 w-24');
      
      let dateTxt = new Date(d.date).toLocaleDateString(undefined,{weekday:'short', day:'2-digit'});
      let precipTxt = d.precip > 0.1 ? (d.precip.toFixed(1)+'mm') : '';

      box.appendChild(el('div','text-[10px] font-bold opacity-70', dateTxt));
      box.appendChild(el('div','text-2xl my-0.5', wxIcon(d.code)));
      box.appendChild(el('div','flex gap-2 text-xs font-bold', null));
      box.lastChild.appendChild(el('span','text-orange-400', fmtC(d.tmax)));
      box.lastChild.appendChild(el('span','text-blue-400', fmtC(d.tmin)));
      if (precipTxt) {
        box.appendChild(el('div','text-[10px] opacity-70', precipTxt));
      }
      dw.appendChild(box);
    });
  }

  // ---------- CALENDAR ----------
  const getStart = ev => (ev?.start?.dateTime || ev?.start?.date || null);
  const getEnd   = ev => (ev?.end?.dateTime   || ev?.end?.date   || null);
  const isAllDay = ev => !!(ev?.start?.date && !ev?.start?.dateTime);
  const computeDuration = (start, end, allDay) => {
    if (allDay) return 'jour entier';
    if (!start || !end) return '—';
    const s=new Date(start), e=new Date(end); let m=Math.round((e-s)/60000); if(m<0)m=0;
    if (m>=60){ const h=Math.floor(m/60), r=m%60; return r ? (h+'h'+String(r).padStart(2,'0')) : (h+'h'); }
    return m+' min';
  };
  function wmoToIconAndText(code) {
    let icon = "☀️", text = "Ciel dégagé", kind = "sec";
    if (code === 0) { icon="☀️"; text="Ciel dégagé"; }
    else if ([1].includes(code)) { icon="🌤️"; text="Peu nuageux"; }
    else if ([2].includes(code)) { icon="🌥️"; text="Partiellement nuageux"; }
    else if ([3].includes(code)) { icon="☁️"; text="Nuageux"; }
    else if ([45,48].includes(code)) { icon="🌫️"; text="Brouillard"; }
    else if ([51,53,55].includes(code)) { icon="🌦️"; text="Bruine"; kind="pluie"; }
    else if ([56,57].includes(code)) { icon="🌧️"; text="Bruine verglaçante"; kind="pluie verglaçante"; }
    else if ([61,63,65].includes(code)) { icon="🌧️"; text="Pluie"; kind="pluie"; }
    else if ([66,67].includes(code)) { icon="🌧️"; text="Pluie verglaçante"; kind="pluie verglaçante"; }
    else if ([71,73,75,77].includes(code)) { icon="❄️"; text="Neige"; kind="neige"; }
    else if ([80,81,82].includes(code)) { icon="🌦️"; text="Averses"; kind="pluie"; }
    else if ([85,86].includes(code)) { icon="🌨️"; text="Averses de neige"; kind="neige"; }
    else if (code === 95) { icon="⛈️"; text="Orages"; kind="orage"; }
    else if ([96,99].includes(code)) { icon="⛈️"; text="Orages violents (grêle)"; kind="grêle"; }
    return { icon, text, kind };
  }
  const getCalName = ev => (ev.calendarName || ev?.organizer?.displayName || ev?.organizer?.email || ev.calendarId || 'Default');

  function extractLocationText(ev){
    const val = ev && ev.location;
    if (typeof val === 'string' && val.trim()) return val;
    if (val && typeof val === 'object'){
      const ks=['displayName','name','address','formatted','query','title','description'];
      for (let k of ks){ const v=val[k]; if (typeof v==='string' && v.trim()) return v; }
      if (val.location && typeof val.location==='object'){
        for (let k of ks){ const v=val.location[k]; if (typeof v==='string' && v.trim()) return v; }
      }
    }
    if (Array.isArray(val)){
      for (let it of val){
        if (typeof it==='string' && it.trim()) return it;
        if (it && typeof it==='object'){
          const ks=['displayName','name','address','formatted','query','title','description'];
          for (let k of ks){ const v=it[k]; if (typeof v==='string' && v.trim()) return v; }
        }
      }
    }
    // Fallback to description (matching Python logic)
    var desc = ev && ev.description;
    if (typeof desc === 'string' && desc.trim()){
      return desc.replace(/<[^>]+>/g, ' ');
    }
    return '';
  }

  const commuteCache = new Map();
  const inflight = new Map();
  const pending = [];
  const MAX_CONCURRENCY = 2;
  let active = 0;

  const io = new IntersectionObserver(entries=>{
    entries.forEach(ent=>{
      if (!ent.isIntersecting) return;
      const chip = ent.target;
      const loc = chip.getAttribute('data-location');
      const at  = chip.getAttribute('data-at');
      const drive_mins = chip.getAttribute('data-drive-minutes');
      const span = chip.querySelector('.js-commute-val');

      if (drive_mins !== null && drive_mins !== '' && drive_mins !== 'null') {
        span.textContent = drive_mins + ' min';
        return;
      }

      if (!loc){ span.textContent='—'; return; }
      const key = (loc.trim()+'|'+String(at||'').trim());

      if (commuteCache.has(key)){
        const v = commuteCache.get(key);
        span.textContent = (v!=null ? (v+' min') : '—');
        return;
      }
      if (inflight.has(key)){
        inflight.get(key).then(()=>{ const v=commuteCache.get(key); if(chip.isConnected) span.textContent=(v!=null? (v+' min'):'—'); });
        return;
      }
      span.textContent = '…';
      pending.push({el:span,key,loc,at});
      runQueue();
    });
  }, { rootMargin: '200px 0px' });

  function runQueue(){ while (active < MAX_CONCURRENCY && pending.length){ doFetch(pending.shift()); } }
  function doFetch(job){
    active += 1;
    const url = '/calendar/drive-time?to='+encodeURIComponent(job.loc)+'&at='+(job.at?encodeURIComponent(job.at):'');
    const ctl = new AbortController();
    const timeout = setTimeout(()=>ctl.abort(), 8000);
    const p = fetch(url, { signal: ctl.signal })
      .then(r=> r.ok ? r.json() : null)
      .then(j=>{
        clearTimeout(timeout);
        const mins = (j && typeof j.minutes === 'number') ? Math.round(j.minutes) : null;
        commuteCache.set(job.key, mins);
        if (job.el && job.el.isConnected) job.el.textContent = (mins!=null ? (mins+' min') : '—');
      })
      .catch(()=>{
        clearTimeout(timeout);
        commuteCache.set(job.key, null);
        if (job.el && job.el.isConnected) job.el.textContent = '—';
      })
      .finally(()=>{
        inflight.delete(job.key);
        active -= 1;
        runQueue();
      });
    inflight.set(job.key, p);
  }

  function homeCalRow(ev, color){
    const s = getStart(ev), e = getEnd(ev), allDay = isAllDay(ev);
    const d = s ? new Date(s) : null;
    const day = d ? String(d.getDate()).padStart(2,'0') : '--';
    const wrap = el('div','cal-grid items-start'); // items-start for better alignment with multiple rows

    const dayBox = el('div','cal-daybox shrink-0', day);
    const dayWrap = el('div','daywrap'); dayWrap.appendChild(dayBox);
    wrap.appendChild(dayWrap);

    // Info Container
    const info = el('div', 'flex-1 min-w-0 flex flex-col gap-1');
    wrap.appendChild(info);

    // Row 1: Time + Duration + Title
    const row1 = el('div', 'flex items-center gap-2');
    info.appendChild(row1);

    const time = el('div','cal-card shrink-0 flex items-center gap-2'); time.style.borderColor = color;
    time.appendChild(el('div','font-bold', allDay ? '—' : (d.toLocaleTimeString(undefined,{hour:'2-digit',minute:'2-digit',hour12:false}))));
    time.appendChild(el('div','subtle text-[10px] whitespace-nowrap', computeDuration(s,e,allDay)));
    row1.appendChild(time);

    const title = el('div','cal-card flex-1 min-w-0 flex items-center'); title.style.borderColor = color;
    const head = document.createElement('a');
    head.className = 'font-bold truncate underline decoration-dotted flex-1';
    head.textContent = ev.summary || ev.title || '(sans titre)';
    const calId = ev.calendarId || (ev.organizer && ev.organizer.email) || '';
    head.href = (ev.id && calId) ? ('/calendar/ui/edit?eventId='+encodeURIComponent(ev.id)+'&calendarId='+encodeURIComponent(calId)) : 'javascript:void(0)';
    title.appendChild(head);
    row1.appendChild(title);

    // Row 2: Location + Cal Name + Trip
    const row2 = el('div', 'flex items-center gap-2');
    info.appendChild(row2);

    const cal = el('div','cal-pill text-[10px] whitespace-nowrap shrink-0 opacity-80 truncate max-w-[80px]', getCalName(ev)); 
    cal.style.borderColor = color; 
    row2.appendChild(cal);

    var locTxt = extractLocationText(ev);
    if (locTxt){
      const loc = el('div', 'text-sm opacity-70 truncate flex-1', `📍 ${locTxt}`);
      row2.appendChild(loc);
    } else {
      row2.appendChild(el('div', 'flex-1'));
    }

    const cell = el('div','cal-trip text-[10px] whitespace-nowrap shrink-0');
    cell.style.borderColor = color;
    cell.setAttribute('data-location', locTxt || '');
    cell.setAttribute('data-at', s || '');

    var dm = ev.drive_minutes || ev.trip_minutes;
    if (dm != null) cell.setAttribute('data-drive-minutes', dm);

    cell.appendChild(el('span','mr-1','🚗'));
    const span = el('span','js-commute-val', cell.getAttribute('data-location') ? '…' : '—');
    cell.appendChild(span);
    io.observe(cell);
    row2.appendChild(cell);

    return wrap;
  }

  async function loadCal(){
    try{
      const cfg = await (await fetch('/calendar/config',{cache:'no-store'})).json();
      const colorsById = {}; (cfg.calendars||[]).forEach(c=>colorsById[c.id]=c.color || 'hsl(210 80% 60%)');
    const min = todayISO(), max = untilISO(14);
      const rs = await fetch('/calendar/events?time_min='+encodeURIComponent(min)+'&time_max='+encodeURIComponent(max), {cache:'no-store'});
      if (!rs.ok) throw new Error('HTTP '+rs.status);
      const data = await rs.json();

      const items = (data.items||[]).slice(0).sort((a,b)=>{
        const sa=(a.start?.dateTime||a.start?.date||''), sb=(b.start?.dateTime||b.start?.date||'');
        return new Date(sa)-new Date(sb);
      });

      const host = document.getElementById('home-cal'); host.innerHTML='';
      const by = {};
      items.forEach(ev=>{
        const s=getStart(ev); if(!s) return; const d=new Date(s);
        const key = d.toLocaleDateString(undefined,{month:'long', year:'numeric'});
        (by[key]=by[key]||[]).push(ev);
      });
      const months = Object.keys(by);
      if (!months.length){ host.innerHTML = '<div class="opacity-70">Aucun évènement dans les 7 jours.</div>'; return; }

      months.forEach(label=>{
        const sec = el('div','space-y-2');
        sec.appendChild(el('div','cal-month', label));
        by[label].forEach(ev=>{
          const cid = (ev.organizer && ev.organizer.email) || ev.calendarId || '';
          const col = colorsById[cid] || 'hsl(210 80% 60%)';
          sec.appendChild(homeCalRow(ev, col));
        });
        host.appendChild(sec);
      });
      document.getElementById('home-cal-err').classList.add('hidden');
    }catch(e){
      document.getElementById('home-cal').innerHTML = '';
      const err = document.getElementById('home-cal-err');
      err.textContent = 'Impossible de charger le calendrier.';
      err.classList.remove('hidden');
    }
  }

  // ---------- STATUS ICONS ----------
  function boot(){
    loadWeather().then(fillWeather).catch(()=> {
      document.getElementById('wx-summary').textContent = 'Météo indisponible';
    });
    loadCal();
    loadIcons();
  }

  document.getElementById('main-action-btn').onclick = () => {
    const say = prompt("Commande vocale (ex: 'allume les lumières', 'prochain évènement')");
    if (say) {
        fetch('/voice/command', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({text: say})
        }).then(r => r.json()).then(d => alert(d.message || (d.ok ? 'OK' : 'Erreur')));
    }
  };

  if (document.readyState === 'loading'){
    document.addEventListener('DOMContentLoaded', boot, {once:true});
  } else {
    boot();
  }
})();
</script>
