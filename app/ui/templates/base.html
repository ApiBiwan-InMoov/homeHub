<!DOCTYPE html>
<html lang="fr" class="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>{% block title %}HomeHub{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              slate: {
                850: '#151c2c',
              }
            }
          }
        }
      }
    </script>
    <link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
    <link rel="alternate icon" href="/static/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="/static/app.css" />
    <style>
      html, body {
        height: 100%;
        margin: 0;
      }
      body { 
        background-color: #0f172a; 
        color: #f8fafc; 
        overflow-y: scroll !important;
        -webkit-overflow-scrolling: touch;
        touch-action: pan-y !important;
        user-select: none;
        /* Hardware acceleration to prevent flickering */
        transform: translateZ(0);
        backface-visibility: hidden;
        /* Optimized for Vertical Tablet 10.1" */
        font-size: 1.1rem;
      }
      .radiator-menu {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(80px, 1fr));
        gap: 0.5rem;
        padding: 0.75rem;
        background: rgba(30, 41, 59, 0.9);
        backdrop-filter: blur(12px);
        border-bottom: 1px solid #334155;
        position: sticky;
        top: 0;
        z-index: 100;
      }
      .menu-item {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.2rem;
        text-decoration: none;
        color: #94a3b8;
        transition: color 0.2s;
      }
      .menu-item:hover, .menu-item.active { color: #f8fafc; }
      .menu-icon { font-size: 1.8rem; }
      .menu-label { font-size: 0.85rem; font-weight: 600; }
      
      main {
        padding-top: 5.5rem; /* Space for the menu bar */
        transition: padding-top 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      }
      body.mini-player-active main {
        padding-top: 10.6rem; /* Space for both menu bar (~5.5rem) and player (~5.1rem) */
      }

      /* Global Mini Player */
      .mini-player-bar {
        position: fixed;
        top: 5.5rem; /* Position below the menu bar */
        left: 0;
        right: 0;
        background: rgba(15, 23, 42, 0.95);
        backdrop-filter: blur(16px);
        border-bottom: 1px solid #334155;
        padding: 0.75rem 1rem;
        z-index: 90;
        transform: translateY(-200%);
        transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 1rem;
      }
      .mini-player-bar.active {
        transform: translateY(0);
      }
      body.mini-player-active .mini-player-bar {
        transform: translateY(0);
      }
      .mini-player-info {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        min-width: 0;
        flex: 1;
      }
      .mini-player-art {
        width: 3.5rem;
        height: 3.5rem;
        border-radius: 0.5rem;
        background: #1e293b;
        flex-shrink: 0;
        overflow: hidden;
      }
      .mini-player-text {
        min-width: 0;
      }
      .mini-track-name {
        font-weight: 700;
        font-size: 0.95rem;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .mini-track-artist {
        font-size: 0.8rem;
        color: #94a3b8;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .mini-player-controls {
        display: flex;
        align-items: center;
        gap: 0.75rem;
      }
      .mini-player-btn {
        width: 2.5rem;
        height: 2.5rem;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 9999px;
        background: transparent;
        transition: all 0.2s;
        font-size: 1.25rem;
      }
      .mini-player-btn:active {
        transform: scale(0.9);
      }
      .mini-player-play-btn {
        background: #22c55e;
        color: white;
      }
    </style>
    {% block head_extra %}{% endblock %}
  </head>
  <body class="min-h-screen">
    <nav class="radiator-menu">

      <a href="/" class="menu-item">
        <span class="menu-icon">🏠</span>
        <span class="menu-label">Accueil</span>
      </a>
      <a href="/calendar/ui" class="menu-item">
        <span class="menu-icon">📅</span>
        <span class="menu-label">Agenda</span>
      </a>
      <a href="/weather" class="menu-item">
        <span class="menu-icon">☀️</span>
        <span class="menu-label">Météo</span>
      </a>
      <a href="/ipx" class="menu-item">
        <span class="menu-icon">⚡</span>
        <span class="menu-label">Élec</span>
      </a>
      <a href="/heating" class="menu-item">
        <span class="menu-icon">🔥</span>
        <span class="menu-label">Chauffage</span>
      </a>
      <a href="/health/ui" class="menu-item">
        <span class="menu-icon">🛠️</span>
        <span class="menu-label">Santé</span>
      </a>
      <a href="/spotify/ui" class="menu-item">
        <span class="menu-icon">🎵</span>
        <span class="menu-label">Spotify</span>
      </a>
      <a href="/shelly" class="menu-item">
        <span class="menu-icon">🔌</span>
        <span class="menu-label">Shelly</span>
      </a>
      <a href="/config" class="menu-item">
        <span class="menu-icon">⚙️</span>
        <span class="menu-label">Réglages</span>
      </a>
      <a href="/devices" class="menu-item">
        <span class="menu-icon">🛡️</span>
        <span class="menu-label">Sécurité</span>
      </a>
      <a href="/logout" class="menu-item" title="Déconnexion">
        <span class="menu-icon">🚪</span>
        <span class="menu-label">Quitter</span>
      </a>
    </nav>
    <main>
      {% block content %}{% endblock %}
    </main>

    <!-- Global Spotify Player Bar -->
    <div id="mini-player" class="mini-player-bar">
      <div class="mini-player-info" onclick="window.location.href='/spotify/ui'">
        <div id="mini-art" class="mini-player-art">
          <div class="w-full h-full flex items-center justify-center text-xl">🎵</div>
        </div>
        <div class="mini-player-text">
          <div id="mini-track" class="mini-track-name">Chargement...</div>
          <div id="mini-artist" class="mini-track-artist">Spotify</div>
        </div>
      </div>
      <div class="mini-player-controls">
        <button onclick="globalSpotifyAction('previous')" class="mini-player-btn">⏮</button>
        <button id="mini-play-pause" onclick="globalTogglePlay()" class="mini-player-btn mini-player-play-btn">▶</button>
        <button onclick="globalSpotifyAction('next')" class="mini-player-btn">⏭</button>
      </div>
    </div>

    <footer class="mt-12 pb-24 text-center text-slate-500 text-sm">
      <a href="/sitemap" class="hover:text-slate-300">Plan du site</a>
    </footer>

    <script src="https://sdk.scdn.co/spotify-player.js"></script>
    <script>
      let globalSpotifyPlayer = null;
      let globalIsPlaying = false;
      let globalBrowserDeviceId = null;

      window.onSpotifyWebPlaybackSDKReady = () => {
        setupGlobalSpotifyPlayer();
      };

      async function setupGlobalSpotifyPlayer() {
        try {
          const response = await fetch('/spotify/token');
          const data = await response.json();
          
          if (!data.ok || !data.access_token) return;

          globalSpotifyPlayer = new Spotify.Player({
            name: 'HomeHub Web Player',
            getOAuthToken: cb => { cb(data.access_token); },
            volume: 0.5
          });

          globalSpotifyPlayer.addListener('player_state_changed', state => { 
            updateGlobalUI(state);
            // Notify current page if it's listening
            window.dispatchEvent(new CustomEvent('spotifyStateChanged', { detail: state }));
          });

          globalSpotifyPlayer.addListener('ready', ({ device_id }) => {
            console.log('Global Spotify Player Ready:', device_id);
            globalBrowserDeviceId = device_id;
            checkAutoTransfer(device_id);
          });

          globalSpotifyPlayer.connect();
        } catch (e) {
          console.error("Global player setup failed", e);
        }
      }

      function updateGlobalUI(state) {
        const miniPlayer = document.getElementById('mini-player');
        if (!state) {
          miniPlayer.classList.remove('active');
          document.body.classList.remove('mini-player-active');
          return;
        }

        miniPlayer.classList.add('active');
        document.body.classList.add('mini-player-active');
        globalIsPlaying = !state.paused;
        document.getElementById('mini-play-pause').textContent = globalIsPlaying ? '⏸' : '▶';
        
        const track = state.track_window.current_track;
        if (track) {
          document.getElementById('mini-track').textContent = track.name;
          document.getElementById('mini-artist').textContent = track.artists.map(a => a.name).join(', ');
          
          if (track.album && track.album.images && track.album.images.length > 0) {
            const artUrl = track.album.images[0].url;
            document.getElementById('mini-art').innerHTML = `<img src="${artUrl}" class="w-full h-full object-cover">`;
          }
        }
      }

      async function checkAutoTransfer(deviceId) {
        try {
          const r = await fetch('/spotify/status');
          const data = await r.json();
          if (data.authenticated && (!data.status || !data.status.is_playing)) {
             // If we are on the spotify page, let it handle the transfer or do it here
             // For now, let's keep it consistent with the previous logic
             console.log("No active playback detected, transferring to browser player...");
             await fetch('/spotify/transfer', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ device_id: deviceId })
             });
          }
          // Initial status sync
          if (data.status) {
             syncGlobalUIWithAPI(data.status);
          }
        } catch (e) {}
      }

      function syncGlobalUIWithAPI(status) {
        const miniPlayer = document.getElementById('mini-player');
        if (!status || !status.item) {
          // If not playing anything, keep mini-player hidden unless state_changed says otherwise
          document.body.classList.remove('mini-player-active');
          return;
        }
        
        miniPlayer.classList.add('active');
        document.body.classList.add('mini-player-active');
        globalIsPlaying = status.is_playing;
        document.getElementById('mini-play-pause').textContent = globalIsPlaying ? '⏸' : '▶';
        document.getElementById('mini-track').textContent = status.item;
        document.getElementById('mini-artist').textContent = status.artist;
        if (status.image) {
          document.getElementById('mini-art').innerHTML = `<img src="${status.image}" class="w-full h-full object-cover">`;
        }
      }

      async function globalTogglePlay() {
        if (globalSpotifyPlayer) {
          globalSpotifyPlayer.togglePlay();
        } else {
          const action = globalIsPlaying ? 'pause' : 'play';
          await globalSpotifyAction(action);
        }
      }

      async function globalSpotifyAction(action) {
        if (globalSpotifyPlayer) {
          try {
            if (action === 'next') await globalSpotifyPlayer.nextTrack();
            else if (action === 'previous') await globalSpotifyPlayer.previousTrack();
            else if (action === 'play') await globalSpotifyPlayer.resume();
            else if (action === 'pause') await globalSpotifyPlayer.pause();
            return;
          } catch (e) {}
        }
        await fetch(`/spotify/${action}`, { method: 'POST' });
        // Status will be updated via player_state_changed or manual refresh
      }
      
      // Periodic sync for when playing on other devices
      setInterval(async () => {
        try {
          const r = await fetch('/spotify/status');
          const data = await r.json();
          if (data.ok && data.status) {
            syncGlobalUIWithAPI(data.status);
          }
        } catch (e) {}
      }, 5000);
    </script>
    <script>
      // Drag-to-scroll implementation for touchscreens appearing as mice
      // or for better touch response.
      (function() {
        let isDown = false;
        let startY;
        let scrollTop;
        const body = document.body;
        let ticking = false;

        window.addEventListener('mousedown', (e) => {
          // If we are clicking on a horizontally scrollable element, don't start vertical drag
          const path = e.composedPath();
          const isHorizontalScroll = path.some(el => {
            if (el instanceof HTMLElement) {
              const style = window.getComputedStyle(el);
              return (style.overflowX === 'auto' || style.overflowX === 'scroll') && (el.scrollWidth > el.clientWidth);
            }
            return false;
          });

          if (isHorizontalScroll) return;

          isDown = true;
          startY = e.pageY - body.offsetTop;
          scrollTop = window.scrollY;
        });

        window.addEventListener('mouseleave', () => {
          isDown = false;
        });

        window.addEventListener('mouseup', () => {
          isDown = false;
        });

        window.addEventListener('mousemove', (e) => {
          if (!isDown) return;
          
          // Check if we are interacting with a horizontally scrollable element
          const path = e.composedPath();
          const isHorizontalScroll = path.some(el => {
            if (el instanceof HTMLElement) {
              const style = window.getComputedStyle(el);
              return (style.overflowX === 'auto' || style.overflowX === 'scroll') && (el.scrollWidth > el.clientWidth);
            }
            return false;
          });

          if (isHorizontalScroll) {
            // If we are over a horizontal scroll area, don't hijack the move
            // This allows the browser's native touch/mouse scroll to work for X
            return;
          }
          
          if (!ticking) {
            window.requestAnimationFrame(() => {
              const y = e.pageY - body.offsetTop;
              const walk = (y - startY) * 1.5; 
              window.scrollTo({
                top: scrollTop - walk,
                behavior: 'auto'
              });
              ticking = false;
            });
            ticking = true;
          }
        });
      })();

      function toggleFullScreen() {
        // Chromium Kiosk Mode (set in start_kiosk.sh) forces the window to be fullscreen
        // and cannot be toggled via JavaScript. 
        // This button will only work if Chromium is started normally.
        
        console.log("Toggle Fullscreen clicked. Current state:", !!document.fullscreenElement);
        
        try {
          if (!document.fullscreenElement && !document.webkitFullscreenElement) {
            const elem = document.documentElement;
            if (elem.requestFullscreen) {
              elem.requestFullscreen();
            } else if (elem.webkitRequestFullscreen) {
              elem.webkitRequestFullscreen();
            }
          } else {
            if (document.exitFullscreen) {
              document.exitFullscreen();
            } else if (document.webkitExitFullscreen) {
              document.webkitExitFullscreen();
            }
          }
        } catch (err) {
          console.error("Fullscreen toggle failed:", err);
        }
      }
      
      // Update icon based on actual fullscreen state
      function handleFullscreenChange() {
        const icon = document.getElementById('fs-icon');
        const label = icon.nextElementSibling;
        if (document.fullscreenElement || document.webkitFullscreenElement || document.mozFullScreenElement) {
          icon.textContent = '内';
          if (label) label.textContent = 'Sortir';
        } else {
          icon.textContent = '⛶';
          if (label) label.textContent = 'Plein écran';
        }
      }

      document.addEventListener('fullscreenchange', handleFullscreenChange);
      document.addEventListener('webkitfullscreenchange', handleFullscreenChange);
      document.addEventListener('mozfullscreenchange', handleFullscreenChange);
      document.addEventListener('MSFullscreenChange', handleFullscreenChange);

      // Optional: Auto-fullscreen on first user interaction if possible
      document.addEventListener('click', function initFS() {
        // Many browsers require user interaction to allow fullscreen
        // We can't force it on load without Kiosk mode, but we can help.
        document.removeEventListener('click', initFS);
      }, { once: true });
    </script>
  </body>
</html>
