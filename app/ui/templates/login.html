<!DOCTYPE html>
<html lang="fr" class="dark">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Connexion · HomeHub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
    <style>
        body { background-color: #0f172a; color: #f8fafc; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    <div class="max-w-md w-full space-y-8 bg-slate-900/50 p-8 rounded-3xl border border-slate-800 shadow-2xl">
        <div class="text-center">
            <div class="text-6xl mb-4">🏠</div>
            <h1 class="text-3xl font-bold text-white">HomeHub</h1>
            <p class="mt-2 text-sm text-slate-400">Veuillez entrer le mot de passe de l'application</p>
        </div>

        {% if error %}
        <div class="bg-red-500/10 border border-red-500/50 text-red-400 px-4 py-3 rounded-xl text-sm text-center">
            {{ error }}
        </div>
        {% endif %}

        <form class="mt-8 space-y-6" action="/login" method="POST">
            <div>
                <label for="password" class="sr-only">Mot de passe</label>
                <input id="password" name="password" type="password" required 
                    class="appearance-none rounded-xl relative block w-full px-4 py-3 border border-slate-700 bg-slate-800 text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent sm:text-sm" 
                    placeholder="Mot de passe">
            </div>

            <div>
                <button type="submit" 
                    class="group relative w-full flex justify-center py-3 px-4 border border-transparent text-sm font-bold rounded-xl text-white bg-indigo-600 hover:bg-indigo-500 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 transition-colors">
                    Se connecter
                </button>
            </div>
        </form>

        <div class="mt-4 text-center text-xs text-slate-500">
            <p>Le mot de passe peut être configuré dans le fichier <code>.env</code> (APP_PASSWORD).</p>
        </div>
    </div>
</body>
</html>
